[pytest]
asyncio_mode = auto
# Put the repo root on sys.path so top-level modules (state, config, mcp_tools,
# …) import under bare `pytest` (not just `python -m pytest`). Requires pytest 7+.
pythonpath = .
testpaths = tests
markers =
    integration: hits real external MCP servers; requires NERVE_INTEGRATION=1 and live credentials
