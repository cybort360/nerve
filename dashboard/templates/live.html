<!DOCTYPE html>
<!-- NERVE — real-backend live dashboard — edit dashboard/showcase_src, regenerate with build.py. / is the scripted showcase. -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NERVE — Live Mission Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   NERVE — living nervous system
   Calm, technical, alive. Motion does the talking.
   ============================================================ */

:root {
  /* surfaces — deep near-black, faint cool cast */
  --bg:        #06090b;
  --bg-1:      #0a0e11;   /* raised panel */
  --bg-2:      #0e1418;   /* inset / hover */
  --bg-3:      #121a1f;

  /* lines */
  --line:      rgba(120, 200, 190, 0.10);
  --line-2:    rgba(120, 200, 190, 0.18);
  --line-soft: rgba(255, 255, 255, 0.05);

  /* the cast */
  --nerve:     #3fe0c5;   /* primary / signal / teal   */
  --synapse:   #9d8bff;   /* violet / memory           */
  --healthy:   #46d39a;   /* green                     */
  --caution:   #f4c25a;   /* amber                     */
  --alert:     #ff6a72;   /* coral                     */

  --nerve-dim:   rgba(63, 224, 197, 0.16);
  --synapse-dim: rgba(157, 139, 255, 0.16);
  --alert-dim:   rgba(255, 106, 114, 0.16);
  --caution-dim: rgba(244, 194, 90, 0.16);

  /* text */
  --text:      #dcebe8;
  --text-mid:  #93a6a3;
  --text-dim:  #5d6e6c;
  --text-faint:#3a4745;

  --mono: 'IBM Plex Mono', ui-monospace, monospace;
  --display: 'Chakra Petch', system-ui, sans-serif;

  --r: 10px;
  --r-sm: 7px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--display);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}

body {
  background:
    radial-gradient(1100px 700px at 70% -10%, rgba(63,224,197,0.045), transparent 60%),
    radial-gradient(900px 600px at 8% 110%, rgba(157,139,255,0.04), transparent 60%),
    var(--bg);
}

#root { height: 100%; }

::selection { background: var(--nerve-dim); color: var(--text); }

/* scrollbars */
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 99px; }
::-webkit-scrollbar-track { background: transparent; }

.mono { font-family: var(--mono); }
.tnum { font-variant-numeric: tabular-nums; }

/* tiny uppercase label */
.eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 500;
}

/* ---- app frame ---- */
.app {
  height: 100%;
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 0;
}

/* ===== header ===== */
.hdr {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 0 22px;
  height: 60px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,255,255,0.012), transparent);
  position: relative;
  z-index: 20;
}

.wordmark {
  display: flex;
  align-items: center;
  gap: 11px;
  user-select: none;
}
.wordmark .mark { width: 26px; height: 26px; display: block; }
.wordmark .name {
  font-family: var(--display);
  font-weight: 600;
  font-size: 19px;
  letter-spacing: 0.34em;
  padding-left: 2px;
  color: var(--text);
}
.wordmark .name b { color: var(--nerve); font-weight: 600; }

/* mission switcher */
.switcher { display: flex; gap: 4px; background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--r); padding: 4px; }
.switcher button {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text-mid);
  background: transparent;
  border: 0;
  padding: 7px 14px;
  border-radius: var(--r-sm);
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: color .2s, background .2s;
  white-space: nowrap;
}
.switcher button .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint); transition: background .2s, box-shadow .2s; }
.switcher button:hover { color: var(--text); }
.switcher button[data-on="true"] { background: var(--bg-3); color: var(--text); }
.switcher button[data-on="true"] .dot { background: var(--nerve); box-shadow: 0 0 8px var(--nerve); }

.hdr-spacer { flex: 1; }

/* header status chips */
.hdr-status { display: flex; align-items: center; gap: 18px; }
.statchip { display: flex; flex-direction: column; gap: 2px; min-width: 64px; }
.statchip .k { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); }
.statchip .v { font-family: var(--mono); font-size: 13px; color: var(--text); font-variant-numeric: tabular-nums; }
.statchip .v.alert { color: var(--alert); }
.statchip .v.caution { color: var(--caution); }
.statchip .v.ok { color: var(--healthy); }

/* control buttons */
.ctrls { display: flex; gap: 8px; }
.btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--text-mid);
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  height: 34px;
  padding: 0 13px;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all .16s;
  white-space: nowrap;
}
.btn:hover { color: var(--text); border-color: var(--line-2); background: var(--bg-2); }
.btn svg { width: 13px; height: 13px; }
.btn.chaos { color: var(--caution); border-color: var(--caution-dim); }
.btn.chaos:hover { background: var(--caution-dim); color: var(--caution); }
.btn.chaos:disabled { opacity: 0.32; cursor: not-allowed; }
.btn.primary { color: var(--nerve); border-color: var(--nerve-dim); }
.btn.primary:hover { background: var(--nerve-dim); }

/* ===== body grid ===== */
.body {
  display: grid;
  grid-template-columns: 272px 1fr 384px;
  min-height: 0;
  height: 100%;
}
.col { min-height: 0; min-width: 0; display: flex; flex-direction: column; }
.col.left   { border-right: 1px solid var(--line); overflow-y: auto; }
.col.right  { border-left: 1px solid var(--line); }
.col.center { position: relative; }

/* panel block inside a column */
.panel { border-bottom: 1px solid var(--line); padding: 18px 18px 20px; }
.panel:last-child { border-bottom: 0; }
.panel-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.panel-hd .ttl { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-mid); }

/* ===== vitals ===== */
.ecg-wrap { position: relative; border-radius: var(--r-sm); overflow: hidden; background: rgba(0,0,0,0.25); border: 1px solid var(--line); }
.ecg-canvas { display: block; width: 100%; height: 96px; }
.ecg-readout { position: absolute; top: 9px; left: 11px; display: flex; align-items: baseline; gap: 7px; pointer-events: none; }
.ecg-readout .big { font-family: var(--display); font-weight: 600; font-size: 30px; line-height: 1; font-variant-numeric: tabular-nums; }
.ecg-readout .unit { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; }
.ecg-band { position: absolute; bottom: 8px; left: 11px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; }
.ecg-bpm { position: absolute; bottom: 8px; right: 11px; font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

/* confidence bar */
.meter { margin-top: 16px; }
.meter-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
.meter-row .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); }
.meter-row .val { font-family: var(--mono); font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; }
.meter-track { height: 5px; border-radius: 99px; background: var(--bg-3); overflow: hidden; }
.meter-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1), background .5s; }

/* agent hub */
.hub-wrap { display: flex; flex-direction: column; align-items: center; }
.hub-svg { width: 100%; height: 188px; display: block; }
.agent-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 7px 12px; width: 100%; margin-top: 6px; }
.agent-row { display: flex; align-items: center; gap: 8px; }
.agent-row .ad { width: 7px; height: 7px; border-radius: 50%; flex: none; transition: box-shadow .25s; }
.agent-row .an { font-family: var(--mono); font-size: 10.5px; color: var(--text-mid); letter-spacing: 0.04em; }
.agent-row .as { margin-left: auto; font-family: var(--mono); font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; }
.agent-row[data-active="true"] .an { color: var(--text); }

/* ===== mission graph ===== */
.graph-head { display: flex; align-items: flex-start; justify-content: space-between; padding: 20px 24px 0; }
.goal-block { max-width: 70%; }
.goal-block .eyebrow { margin-bottom: 7px; }
.goal-block .goal { font-family: var(--display); font-weight: 500; font-size: 19px; line-height: 1.35; color: var(--text); letter-spacing: 0.01em; }
.goal-block .goal .hl { color: var(--nerve); }
.phase-badge { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-mid); border: 1px solid var(--line); border-radius: 99px; padding: 6px 12px; white-space: nowrap; }
.phase-badge .pd { width: 7px; height: 7px; border-radius: 50%; background: var(--nerve); box-shadow: 0 0 8px var(--nerve); }

.graph-stage { position: relative; flex: 1; min-height: 0; margin: 8px 0 0; }
.graph-region { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column; }
.graph-svg { position: absolute; inset: 0; width: 100%; height: 100%; }

/* graph node card (HTML overlay positioned absolutely) */
.gnode {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 158px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 9px 11px 10px;
  transition: border-color .35s, background .35s, opacity .45s, box-shadow .45s, transform .35s;
  cursor: default;
  animation: node-appear .42s ease;
}
@keyframes node-appear { from { opacity: 0; } to { opacity: 1; } }
.gnode .gn-top { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
.gnode .gn-ic { width: 15px; height: 15px; flex: none; color: var(--text-dim); transition: color .3s; }
.gnode .gn-agent { font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); margin-left: auto; }
.gnode .gn-label { font-family: var(--display); font-size: 12.5px; line-height: 1.28; color: var(--text-mid); font-weight: 500; transition: color .3s; }
.gnode .gn-status { margin-top: 7px; height: 2px; border-radius: 2px; background: var(--bg-3); overflow: hidden; }
.gnode .gn-status i { display: block; height: 100%; width: 0%; background: var(--nerve); transition: width .5s linear; }

.gnode[data-state="pending"] { opacity: 0.5; }
.gnode[data-state="active"] { border-color: var(--nerve); background: var(--bg-2); box-shadow: 0 0 0 1px var(--nerve-dim), 0 0 28px -6px var(--nerve); }
.gnode[data-state="active"] .gn-ic { color: var(--nerve); }
.gnode[data-state="active"] .gn-label { color: var(--text); }
.gnode[data-state="active"] .gn-status i { width: 60%; animation: gn-load 2.4s linear infinite; }
.gnode[data-state="done"] { border-color: var(--line-2); }
.gnode[data-state="done"] .gn-ic { color: var(--healthy); }
.gnode[data-state="done"] .gn-label { color: var(--text-mid); }
.gnode[data-state="done"] .gn-status i { width: 100%; background: var(--healthy); }
.gnode[data-state="approval"] { border-color: var(--caution); background: var(--bg-2); box-shadow: 0 0 0 1px var(--caution-dim), 0 0 30px -6px var(--caution); }
.gnode[data-state="approval"] .gn-ic { color: var(--caution); }
.gnode[data-state="approval"] .gn-label { color: var(--text); }
.gnode[data-state="approval"] .gn-status i { width: 100%; background: var(--caution); animation: gn-pulse 1.3s ease-in-out infinite; }
.gnode[data-state="alert"] { border-color: var(--alert); background: var(--bg-2); box-shadow: 0 0 0 1px var(--alert-dim), 0 0 30px -6px var(--alert); }
.gnode[data-state="alert"] .gn-ic { color: var(--alert); }
.gnode[data-state="alert"] .gn-label { color: var(--text); }
.gnode[data-state="alert"] .gn-status i { width: 100%; background: var(--alert); animation: gn-pulse 1s ease-in-out infinite; }
.gnode.chaos-born { animation: chaos-pop .5s cubic-bezier(.2,1.3,.4,1) both; }

@keyframes gn-load { 0%{transform:translateX(-100%)} 100%{transform:translateX(220%)} }
@keyframes gn-pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
@keyframes chaos-pop { 0%{opacity:0; transform:translate(-50%,-50%) scale(.7)} 100%{opacity:1; transform:translate(-50%,-50%) scale(1)} }

/* ===== event feed ===== */
.feed { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 0 32px; }
.feed-empty { padding: 40px 22px; color: var(--text-dim); font-family: var(--mono); font-size: 12px; text-align: center; }
.evt { display: grid; grid-template-columns: 14px 1fr; gap: 12px; padding: 9px 20px 9px 18px; animation: evt-in .4s cubic-bezier(.2,.8,.3,1) both; position: relative; }
.evt-rail { position: relative; }
.evt-rail .line { position: absolute; left: 6px; top: -9px; bottom: -9px; width: 1px; background: var(--line); }
.evt-rail .dot { position: absolute; left: 3px; top: 5px; width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); border: 2px solid var(--bg); z-index: 1; }
.evt:first-child .evt-rail .line { top: 9px; }
.evt-body { min-width: 0; }
.evt-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
.evt-agent { font-family: var(--mono); font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; }
.evt-time { font-family: var(--mono); font-size: 9px; color: var(--text-faint); margin-left: auto; font-variant-numeric: tabular-nums; }
.evt-text { font-family: var(--mono); font-size: 12px; line-height: 1.5; color: var(--text-mid); }
.evt-text .em { color: var(--text); }
.evt-text .num { color: var(--nerve); }
.evt-text .bad { color: var(--alert); }
.evt-text .good { color: var(--healthy); }
.evt-tool { display: inline-flex; align-items: center; gap: 6px; margin-top: 6px; font-family: var(--mono); font-size: 10px; color: var(--text-dim); border: 1px solid var(--line); border-radius: 5px; padding: 3px 8px; background: var(--bg-1); }
.evt-tool .tg { width: 5px; height: 5px; border-radius: 50%; background: var(--synapse); }

.evt[data-kind="alert"] .evt-rail .dot { background: var(--alert); box-shadow: 0 0 9px var(--alert); }
.evt[data-kind="risk"] .evt-rail .dot { background: var(--caution); box-shadow: 0 0 9px var(--caution); }
.evt[data-kind="approval"] .evt-rail .dot { background: var(--caution); box-shadow: 0 0 10px var(--caution); }
.evt[data-kind="success"] .evt-rail .dot { background: var(--healthy); box-shadow: 0 0 9px var(--healthy); }
.evt[data-kind="signal"] .evt-rail .dot { background: var(--nerve); box-shadow: 0 0 9px var(--nerve); }
.evt[data-kind="memory"] .evt-rail .dot { background: var(--synapse); box-shadow: 0 0 9px var(--synapse); }

@keyframes evt-in { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }

/* ===== approval ===== */
.approval-dock { padding: 16px; border-top: 1px solid var(--caution-dim); background: linear-gradient(180deg, var(--caution-dim), transparent 60%); animation: dock-in .45s cubic-bezier(.2,.8,.3,1) both; }
@keyframes dock-in { from { opacity:0; transform: translateY(12px);} to {opacity:1; transform:none;} }
.appcard { }
.appcard .ac-top { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; }
.appcard .ac-badge { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--caution); display: flex; align-items: center; gap: 7px; }
.appcard .ac-badge .ping { width: 8px; height: 8px; border-radius: 50%; background: var(--caution); box-shadow: 0 0 10px var(--caution); animation: gn-pulse 1.1s ease-in-out infinite; }
.appcard .ac-title { font-family: var(--display); font-weight: 600; font-size: 16px; color: var(--text); margin: 0 0 4px; line-height: 1.3; }
.appcard .ac-detail { font-family: var(--mono); font-size: 11.5px; line-height: 1.55; color: var(--text-mid); margin-bottom: 12px; }
.appcard .ac-detail .num { color: var(--nerve); }
.appcard .ac-detail .bad { color: var(--alert); }
.appcard .ac-rows { display: flex; flex-direction: column; gap: 1px; margin-bottom: 14px; border: 1px solid var(--line); border-radius: var(--r-sm); overflow: hidden; }
.appcard .ac-r { display: flex; justify-content: space-between; gap: 12px; padding: 8px 11px; background: var(--bg-1); font-family: var(--mono); font-size: 11px; }
.appcard .ac-r .k { color: var(--text-dim); }
.appcard .ac-r .v { color: var(--text); text-align: right; }
.appcard .ac-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.appcard .ac-btn { font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; height: 42px; border-radius: var(--r-sm); cursor: pointer; border: 1px solid; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.appcard .ac-btn.reject { background: transparent; border-color: var(--line-2); color: var(--text-mid); }
.appcard .ac-btn.reject:hover { color: var(--alert); border-color: var(--alert-dim); background: var(--alert-dim); }
.appcard .ac-btn.approve { background: var(--nerve); border-color: var(--nerve); color: #04211c; font-weight: 600; }
.appcard .ac-btn.approve:hover { box-shadow: 0 0 22px -4px var(--nerve); }
.appcard .ac-hint { margin-top: 10px; font-family: var(--mono); font-size: 9.5px; color: var(--text-dim); text-align: center; letter-spacing: 0.04em; display: flex; align-items: center; justify-content: center; gap: 7px; }
.appcard .ac-hint svg { width: 12px; height: 12px; color: var(--synapse); }

/* ===== telegram phone mirror ===== */
.phone-fab { position: absolute; left: 22px; bottom: 20px; z-index: 30; }
.phone {
  width: 248px;
  border-radius: 30px;
  background: #0c1013;
  border: 1px solid var(--line-2);
  box-shadow: 0 30px 70px -20px rgba(0,0,0,0.8), 0 0 0 6px rgba(0,0,0,0.4);
  padding: 9px;
  transform-origin: bottom right;
  animation: phone-in .5s cubic-bezier(.2,.9,.3,1) both;
}
@keyframes phone-in { from{opacity:0; transform: translateY(20px) scale(.92);} to{opacity:1; transform:none;} }
.phone-screen { background: #0e1621; border-radius: 22px; overflow: hidden; }
.tg-bar { display: flex; align-items: center; gap: 9px; padding: 11px 13px; background: #17212b; border-bottom: 1px solid rgba(255,255,255,0.05); }
.tg-bar .tg-av { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--nerve), var(--synapse)); display:flex; align-items:center; justify-content:center; }
.tg-bar .tg-nm { font-family: var(--display); font-size: 13px; color: #e6f0f5; font-weight: 600; }
.tg-bar .tg-sub { font-family: var(--mono); font-size: 9px; color: #6b8299; }
.tg-body { padding: 13px 11px 15px; min-height: 150px; background:
   radial-gradient(circle at 20% 10%, rgba(63,224,197,0.05), transparent 40%),
   #0e1621; }
.tg-bubble { background: #18222d; border-radius: 4px 14px 14px 14px; padding: 11px 12px; max-width: 96%; animation: evt-in .4s both; }
.tg-bubble .tgb-h { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--caution); margin-bottom: 6px; display:flex; align-items:center; gap:6px;}
.tg-bubble .tgb-t { font-family: var(--display); font-size: 13px; color: #e6f0f5; font-weight: 600; margin-bottom: 5px; line-height:1.3; }
.tg-bubble .tgb-d { font-family: var(--mono); font-size: 10.5px; color: #a9bccb; line-height: 1.5; margin-bottom: 10px; }
.tg-bubble .tgb-btns { display: flex; gap: 7px; }
.tg-bubble .tgb-b { flex: 1; text-align: center; font-family: var(--mono); font-size: 11px; padding: 8px; border-radius: 8px; cursor: pointer; transition: all .15s; }
.tg-bubble .tgb-b.y { background: var(--nerve); color: #04211c; font-weight: 600; }
.tg-bubble .tgb-b.n { background: #25323d; color: #a9bccb; }
.tg-bubble .tgb-b.y:hover { box-shadow: 0 0 16px -3px var(--nerve); }
.tg-time { text-align: right; font-family: var(--mono); font-size: 8px; color: #5a7187; margin-top: 5px; }
.tg-resolved { font-family: var(--mono); font-size: 10px; color: var(--healthy); text-align:center; padding: 8px; }
.phone-close { position: absolute; top: -10px; left: -10px; width: 26px; height: 26px; border-radius: 50%; background: var(--bg-2); border: 1px solid var(--line-2); color: var(--text-mid); cursor: pointer; display:flex; align-items:center; justify-content:center; font-family: var(--mono); }
.phone-close:hover { color: var(--text); }

.phone-pill { display: inline-flex; align-items: center; gap: 9px; height: 40px; padding: 0 15px; border-radius: 99px; background: var(--bg-1); border: 1px solid var(--line-2); color: var(--text-mid); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all .16s; }
.phone-pill:hover { color: var(--text); border-color: var(--nerve-dim); }
.phone-pill .pp-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); }
.phone-pill[data-alert="true"] .pp-dot { background: var(--caution); box-shadow: 0 0 9px var(--caution); animation: gn-pulse 1.1s infinite; }

/* completion overlay note */
.done-toast { position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%); z-index: 25; display:flex; align-items:center; gap:10px; padding: 10px 16px; border-radius: 99px; background: rgba(70,211,154,0.12); border: 1px solid rgba(70,211,154,0.35); color: var(--healthy); font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; animation: evt-in .5s both; }

/* idle hint */
.idle-hint { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; text-align: center; pointer-events: none; }
.idle-hint .ih-ring { width: 58px; height: 58px; }
.idle-hint .ih-t { font-family: var(--mono); font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; }

/* ============================================================
   v2 additions
   ============================================================ */

/* ---- metric sparkline (vitals) ---- */
.spark { margin-top: 16px; }
.spark-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
.spark-row .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--text-dim); }
.spark-row .val { font-family: var(--mono); font-size: 13px; font-variant-numeric: tabular-nums; color: var(--text); }
.spark-canvas { display: block; width: 100%; height: 40px; border-radius: var(--r-sm); }

/* ---- coherence chip ---- */
.coh { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
.coh .cd { width: 7px; height: 7px; border-radius: 50%; transition: background .3s, box-shadow .3s; }

/* ---- memory panel ---- */
.mem-list { display: flex; flex-direction: column; gap: 7px; }
.mem-empty { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); padding: 6px 0; }
.mem-fact {
  border: 1px solid var(--line); border-radius: var(--r-sm); padding: 8px 10px;
  background: var(--bg-1); position: relative; overflow: hidden;
  animation: mem-flash .7s ease-out;
}
.mem-fact[data-op="contradict"] { animation: mem-shake .5s ease-out; border-color: var(--alert-dim); }
.mem-fact .mf-top { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
.mem-fact .mf-k { font-family: var(--mono); font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--text-dim); }
.mem-fact .mf-conf { margin-left: auto; font-family: var(--mono); font-size: 9px; font-variant-numeric: tabular-nums; }
.mem-fact .mf-v { font-family: var(--mono); font-size: 12px; color: var(--text); line-height: 1.35; }
.mem-fact[data-op="contradict"] .mf-v { color: var(--alert); text-decoration: line-through; text-decoration-color: rgba(255,106,114,0.6); }
.mem-fact .mf-bar { position: absolute; left: 0; bottom: 0; height: 2px; background: var(--synapse); transition: width .5s; opacity: 0.8; }
@keyframes mem-flash { 0% { box-shadow: inset 0 0 0 99px rgba(157,139,255,0.10); } 100% { box-shadow: inset 0 0 0 99px transparent; } }
@keyframes mem-shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-3px)} 40%{transform:translateX(3px)} 60%{transform:translateX(-2px)} 80%{transform:translateX(2px)} }

/* ---- feed typing caret ---- */
.evt .caret { display: inline-block; width: 7px; height: 13px; margin-left: 1px; vertical-align: -2px; background: var(--nerve); animation: caret-blink 0.9s steps(1) infinite; }
@keyframes caret-blink { 50% { opacity: 0; } }
.thinking-row { display: flex; align-items: center; gap: 9px; padding: 8px 20px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.thinking-row .td { display: flex; gap: 3px; }
.thinking-row .td i { width: 4px; height: 4px; border-radius: 50%; background: var(--text-dim); animation: think 1.1s ease-in-out infinite; }
.thinking-row .td i:nth-child(2){ animation-delay: .18s; } .thinking-row .td i:nth-child(3){ animation-delay: .36s; }
@keyframes think { 0%,100%{opacity:.25; transform:translateY(0)} 50%{opacity:1; transform:translateY(-2px)} }

/* ---- graph node jitter under tension ---- */
.graph-stage[data-tension="high"] .gnode[data-state="active"],
.graph-stage[data-tension="high"] .gnode[data-state="alert"],
.graph-stage[data-tension="high"] .gnode[data-state="approval"] {
  animation: gn-jitter 0.22s steps(2) infinite;
}
@keyframes gn-jitter {
  0% { transform: translate(calc(-50% - 0.7px), calc(-50% + 0.5px)); }
  100% { transform: translate(calc(-50% + 0.7px), calc(-50% - 0.5px)); }
}

/* ---- approval impact / blast viz ---- */
.ac-impact { border: 1px solid var(--line); border-radius: var(--r-sm); padding: 10px 11px; background: rgba(0,0,0,0.2); margin-bottom: 12px; }
.ac-impact .ai-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
.ac-impact .ai-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--text-dim); }
.ac-impact .ai-sub { font-family: var(--mono); font-size: 9px; color: var(--text-faint); }
.ac-pods { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
.ac-pods i { aspect-ratio: 1; border-radius: 2px; background: var(--bg-3); border: 1px solid var(--line-2); }
.ac-pods i.hit { background: var(--caution); border-color: var(--caution); box-shadow: 0 0 6px -1px var(--caution); animation: pod-in .4s both; }
@keyframes pod-in { from { opacity: 0; transform: scale(.5);} to {opacity:1; transform: none;} }
.ac-cost { display: flex; align-items: center; gap: 12px; }
.ac-cost .acc-amt { font-family: var(--display); font-weight: 600; font-size: 24px; color: var(--caution); }
.ac-cost .acc-meta { font-family: var(--mono); font-size: 10px; color: var(--text-mid); line-height: 1.5; }

/* ---- goal launcher (front door) ---- */
.launcher { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 18; padding: 24px; }
.launcher-card { width: min(560px, 86%); animation: evt-in .5s both; }
.launcher .lc-eyebrow { display: flex; align-items: center; gap: 9px; margin-bottom: 16px; }
.launcher .lc-pulse { width: 9px; height: 9px; border-radius: 50%; background: var(--nerve); box-shadow: 0 0 12px var(--nerve); animation: gn-pulse 1.6s ease-in-out infinite; }
.launcher .lc-eyebrow span { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); }
.launcher .lc-field { display: flex; gap: 10px; align-items: stretch; }
.launcher textarea {
  flex: 1; resize: none; background: var(--bg-1); border: 1px solid var(--line-2); border-radius: var(--r);
  color: var(--text); font-family: var(--display); font-size: 17px; line-height: 1.4; padding: 14px 16px;
  min-height: 64px; transition: border-color .2s;
}
.launcher textarea:focus { outline: none; border-color: var(--nerve); box-shadow: 0 0 0 1px var(--nerve-dim); }
.launcher textarea::placeholder { color: var(--text-faint); }
.launcher .lc-run {
  flex: none; width: 56px; border-radius: var(--r); border: 1px solid var(--nerve); background: var(--nerve);
  color: #04211c; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: box-shadow .2s;
}
.launcher .lc-run:hover { box-shadow: 0 0 24px -4px var(--nerve); }
.launcher .lc-run svg { width: 20px; height: 20px; }
.launcher .lc-sugs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.launcher .lc-sug { font-family: var(--mono); font-size: 11px; color: var(--text-mid); background: var(--bg-1); border: 1px solid var(--line); border-radius: 99px; padding: 7px 13px; cursor: pointer; transition: all .16s; display: flex; align-items: center; gap: 8px; }
.launcher .lc-sug:hover { color: var(--text); border-color: var(--nerve-dim); }
.launcher .lc-sug .sd { width: 6px; height: 6px; border-radius: 50%; background: var(--nerve); }
.launcher .lc-hint { margin-top: 18px; font-family: var(--mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.04em; }
.launching-note { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 16; font-family: var(--mono); font-size: 12px; color: var(--nerve); letter-spacing: 0.1em; display: flex; align-items: center; gap: 10px; animation: gn-pulse 1.4s ease-in-out infinite; pointer-events: none; }

/* ---- fleet roster ---- */
.fleet { position: relative; }
.fleet-btn { display: inline-flex; align-items: center; gap: 9px; height: 34px; padding: 0 12px; border-radius: var(--r-sm); border: 1px solid var(--line); background: var(--bg-1); color: var(--text-mid); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all .16s; }
.fleet-btn:hover { color: var(--text); border-color: var(--line-2); }
.fleet-btn .fdots { display: flex; gap: 3px; }
.fleet-btn .fdots i { width: 5px; height: 5px; border-radius: 50%; }
.fleet-pop { position: absolute; top: 42px; left: 0; width: 270px; background: var(--bg-1); border: 1px solid var(--line-2); border-radius: var(--r); padding: 7px; z-index: 40; box-shadow: 0 24px 50px -18px rgba(0,0,0,0.7); animation: evt-in .2s both; }
.fleet-pop .fp-hd { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); padding: 6px 9px 8px; }
.fleet-item { display: flex; align-items: center; gap: 10px; padding: 9px; border-radius: var(--r-sm); cursor: pointer; transition: background .14s; }
.fleet-item:hover { background: var(--bg-2); }
.fleet-item.ghost { cursor: default; opacity: 0.7; }
.fleet-item .fi-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.fleet-item .fi-body { min-width: 0; flex: 1; }
.fleet-item .fi-nm { font-family: var(--display); font-size: 13px; color: var(--text); }
.fleet-item .fi-sub { font-family: var(--mono); font-size: 9.5px; color: var(--text-dim); }
.fleet-item .fi-st { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }

/* ---- mute button ---- */
.icon-btn { width: 34px; height: 34px; border-radius: var(--r-sm); border: 1px solid var(--line); background: var(--bg-1); color: var(--text-dim); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all .16s; }
.icon-btn:hover { color: var(--text); border-color: var(--line-2); }
.icon-btn[data-on="true"] { color: var(--nerve); border-color: var(--nerve-dim); }
.icon-btn svg { width: 15px; height: 15px; }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; }
}

/* ---- live adapter additions (SP1) ---- */
.live-tag{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1.5px;color:#46d39a;border:1px solid rgba(70,211,154,.4);border-radius:4px;padding:1px 4px 0;margin-left:9px;align-self:center;}
.launch-wait{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#5d6e6c;font-size:13px;letter-spacing:.5px;}

/* ---- cross-links between live (/) and scripted demo (/showcase) ---- */
.demo-link, .live-link { text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.demo-link { color: #9d8bff; border-color: rgba(157,139,255,.42); }
.demo-link:hover { border-color: rgba(157,139,255,.75); background: rgba(157,139,255,.08); }
.live-link { color: #46d39a; border-color: rgba(70,211,154,.42); }
.live-link:hover { border-color: rgba(70,211,154,.75); background: rgba(70,211,154,.08); }

/* ---- research result modal (live dashboard) ---- */
.result-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(3,6,7,.72);backdrop-filter:blur(6px);animation:resultIn .25s ease;}
.result-card{position:relative;width:min(560px,92vw);max-height:84vh;overflow:auto;background:linear-gradient(180deg,#0e1416,#0a0f11);border:1px solid rgba(63,224,197,.28);border-radius:16px;padding:30px 30px 24px;box-shadow:0 24px 80px rgba(0,0,0,.6);}
.result-close{position:absolute;top:14px;right:16px;background:none;border:none;color:#5d6e6c;font-size:15px;cursor:pointer;padding:4px;line-height:1;}
.result-close:hover{color:#eafdf8;}
.result-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(70,211,154,.12);color:#46d39a;margin-bottom:14px;}
.result-icon svg{width:24px;height:24px;}
.result-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#46d39a;margin-bottom:7px;}
.result-goal{font-family:'Chakra Petch',sans-serif;font-size:18px;font-weight:600;color:#eafdf8;margin-bottom:16px;line-height:1.3;}
.result-body{font-size:14px;line-height:1.65;color:#c4d4d0;}
.result-body strong{color:#eafdf8;}
.result-body a{color:#3fe0c5;text-decoration:none;border-bottom:1px solid rgba(63,224,197,.4);}
.result-body a:hover{border-color:#3fe0c5;}
.result-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}
.result-hint{display:flex;align-items:center;gap:6px;margin-top:14px;font-size:11px;color:#5d6e6c;}
.result-hint svg{width:12px;height:12px;}
@keyframes resultIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

/* result modal buttons (match the approval dock; were falling back to browser defaults) */
.result-actions .ac-btn{font-family:var(--mono);font-size:12px;letter-spacing:.06em;height:40px;padding:0 20px;border-radius:var(--r-sm);cursor:pointer;border:1px solid;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;}
.result-actions .ac-btn.reject{background:transparent;border-color:var(--line-2);color:var(--text-mid);}
.result-actions .ac-btn.reject:hover{color:var(--alert);border-color:var(--alert-dim);background:var(--alert-dim);}
.result-actions .ac-btn.approve{background:var(--nerve);border-color:var(--nerve);color:#04211c;font-weight:600;}
.result-actions .ac-btn.approve:hover{box-shadow:0 0 22px -4px var(--nerve);}

</style>

<script type="text/babel" data-source="live-data.jsx">
/* ============================================================
   NERVE — LIVE data adapter (SP1)
   Replaces the scripted data.jsx. Provides the static constants
   the components expect (AGENTS, AGENT_COLOR, MISSIONS presets,
   FLEET_GHOSTS) plus pure mapping helpers that turn the real
   backend (GET /missions/{id} + /ws/{id} events) into the exact
   shapes the presentational components consume.
   No backend changes — surfaces with no real data (memory,
   sparkline, blast radius) stay empty until SP2/SP3.
   ============================================================ */

const AGENTS = [
  { id: 'planner',   name: 'Planner',   role: 'plans',  color: '#9d8bff' },
  { id: 'execution', name: 'Execution', role: 'acts',   color: '#3fe0c5' },
  { id: 'risk',      name: 'Risk',      role: 'scores', color: '#f4c25a' },
  { id: 'auditor',   name: 'Auditor',   role: 'checks', color: '#46d39a' },
];
const ORCH = { id: 'orchestrator', name: 'Orchestrator', color: '#dcebe8' };
const AGENT_COLOR = {
  planner: '#9d8bff', execution: '#3fe0c5', risk: '#f4c25a',
  auditor: '#46d39a', orchestrator: '#dcebe8', system: '#5d6e6c',
};

/* Launch presets — the two mission types you can start. Each spawns a REAL
   backend mission; the dashboard then renders that mission's live state under
   the preset's identity (label + metric). nodes/edges are filled at runtime. */
const MISSIONS = {
  incident: {
    id: 'incident', label: 'Incident Autopilot', mission_type: 'INCIDENT_RESPONSE',
    launch: 'demo', // GET /demo/start
    goal: 'Keep <span class="hl">checkout</span> healthy — detect, diagnose & resolve production anomalies.',
    goalText: 'Keep checkout healthy — detect, diagnose and resolve production incidents automatically.',

  },
  research: {

    launch: 'create', // POST /missions {goal, mission_type:'GENERAL'}
    goal: 'Find the cheapest <span class="hl">2026 World Cup final</span> ticket + a cheap, well-reviewed hotel nearby.',
    goalText: 'Find the cheapest 2026 World Cup final ticket and a cheap, well-reviewed hotel nearby.',
    metric: { label: 'cheapest ticket', unit: '$', baseline: null, lowerBetter: true, prefix: '$' },
    nodes: [], edges: [], chaosEdges: [], approvalNode: null,
  },
};

const FLEET_GHOSTS = [
  { id: 'cost-audit', label: 'Nightly cost audit', status: 'queued', sub: 'starts 02:00' },
  { id: 'sec-sweep',  label: 'Dependency CVE sweep', status: 'running', sub: 'no action needed' },
];

/* ---------------- status / phase mapping ---------------- */
const PHASE_LABEL = {
  pending: 'Ready', planning: 'Planning', executing: 'Executing',
  replanning: 'Re-planning', resolved: 'Resolved', failed: 'Failed',
};
function mapPhase(status) { return PHASE_LABEL[status] || (status ? status[0].toUpperCase() + status.slice(1) : 'Ready'); }
function isTerminal(status) { return status === 'resolved' || status === 'failed'; }

function nodeStateFor(taskStatus) {
  if (taskStatus === 'completed') return 'done';
  if (taskStatus === 'in_progress' || taskStatus === 'retrying') return 'active';
  if (taskStatus === 'failed') return 'alert';
  return 'pending';
}

/* ---------------- graph auto-layout from tasks ---------------- */
const ICON_BY_AGENT = { planner: 'route', execution: 'bolt', risk: 'radius', auditor: 'check' };
function iconForTask(task) {
  const d = (task.description || '').toLowerCase();
  if (d.includes('search') || d.includes('find')) return 'target';
  if (d.includes('rollback') || d.includes('revert') || d.includes('deploy')) return 'git';
  if (d.includes('verify') || d.includes('check')) return 'check';
  if (d.includes('approv')) return 'shield';
  return ICON_BY_AGENT[task.agent_role] || 'target';
}
function shortLabel(desc) {
  if (!desc) return 'task';
  const s = desc.trim();
  return s.length > 34 ? s.slice(0, 32).trimEnd() + '…' : s;
}

/* Longest-path layering → left-to-right DAG, evenly spread vertically. */
function buildGraph(tasks) {
  if (!tasks || !tasks.length) return { nodes: [], edges: [] };
  const byId = {};
  tasks.forEach(t => { byId[t.task_id] = t; });
  const depth = {};
  const visiting = {};
  function depthOf(id) {
    if (depth[id] != null) return depth[id];
    if (visiting[id]) return 0; // guard against cycles
    visiting[id] = true;
    const deps = (byId[id] && byId[id].depends_on) || [];
    let d = 0;
    deps.forEach(dep => { if (byId[dep]) d = Math.max(d, depthOf(dep) + 1); });
    visiting[id] = false;
    return (depth[id] = d);
  }
  tasks.forEach(t => depthOf(t.task_id));
  const maxLayer = Math.max(1, ...Object.values(depth));
  const layers = {};
  tasks.forEach(t => { const L = depth[t.task_id]; (layers[L] = layers[L] || []).push(t); });

  const nodes = [];
  Object.keys(layers).forEach(Lk => {
    const L = +Lk;
    const col = layers[L];
    const x = maxLayer === 0 ? 50 : 9 + (L / maxLayer) * 82;
    col.forEach((t, i) => {
      const span = col.length;
      const y = span === 1 ? 50 : 18 + (i / (span - 1)) * 64;
      nodes.push({
        id: t.task_id, x, y, agent: t.agent_role || 'execution',
        icon: iconForTask(t), label: shortLabel(t.description), _status: t.status,
      });
    });
  });
  const ids = new Set(nodes.map(n => n.id));
  const edges = [];
  tasks.forEach(t => (t.depends_on || []).forEach(dep => { if (ids.has(dep)) edges.push([dep, t.task_id]); }));
  return { nodes, edges };
}

/* ---------------- event → feed item ---------------- */
const FEED_NOISE = new Set([
  'SNAPSHOT_TAKEN', 'MCP_TOOL_RESULT', 'MCP_TOOL_CALLED', 'AGENT_OBSERVATION',
  'RESOLUTION_CHECK', 'RISK_SCORE_UPDATED', 'METRIC_SAMPLE', 'BELIEF_UPDATED',
]);

/* beliefs (backend working memory) → MemoryPanel facts */
function beliefsToFacts(beliefs) {
  return (beliefs || []).map(b => ({
    k: b.key, label: b.label, v: b.value, conf: b.confidence, op: b.op, ver: b.version,
  }));
}

/* metric samples → sparkline {values, meta}; meta drives label/unit/baseline */
function seriesToSparkline(samples) {
  const s = samples || [];
  if (!s.length) return { values: [], meta: null };
  const latest = s[s.length - 1];
  const unit = latest.unit || '';
  return {
    values: s.map(x => x.value),
    meta: {
      label: latest.label || 'metric',
      unit,
      baseline: latest.baseline != null ? latest.baseline : null,
      lowerBetter: unit === '%' || unit === 'ms' || unit === '$',
      prefix: unit === '$' ? '$' : undefined,
    },
  };
}

/* Incident milestone graph — the demo emits milestone events but no task rows,
   so we light a fixed incident pipeline from the REAL events that arrive. */
const INCIDENT_MILESTONES = [
  { id: 'detect',    x: 9,  y: 50, agent: 'execution',    icon: 'pulse',  label: 'Detect anomaly',   on: ['INCIDENT_DETECTED'] },
  { id: 'correlate', x: 30, y: 32, agent: 'execution',    icon: 'git',    label: 'Assemble context', on: ['CONTEXT_ASSEMBLED'] },
  { id: 'diagnose',  x: 50, y: 50, agent: 'planner',      icon: 'target', label: 'Root-cause',       on: ['REASONING_COMPLETE'] },
  { id: 'approve',   x: 70, y: 32, agent: 'orchestrator', icon: 'shield', label: 'Human approval',   on: ['ACTION_CREATED', 'DEMO_APPROVAL_REQUESTED'] },
  { id: 'execute',   x: 86, y: 50, agent: 'execution',    icon: 'bolt',   label: 'Execute',          on: ['ACTION_EXECUTED', 'ACTION_APPROVED'] },
  { id: 'verify',    x: 96, y: 74, agent: 'auditor',      icon: 'check',  label: 'Verify recovery',  on: ['RESOLUTION_MONITORING_STARTED'] },
];
const INCIDENT_MS_EDGES = [
  ['detect', 'correlate'], ['correlate', 'diagnose'], ['diagnose', 'approve'],
  ['approve', 'execute'], ['execute', 'verify'],
];
function buildMilestoneGraph(seenTypes, resolved) {
  const nodes = INCIDENT_MILESTONES.map(m => ({ id: m.id, x: m.x, y: m.y, agent: m.agent, icon: m.icon, label: m.label }));
  const states = {};
  let lastDone = -1;
  INCIDENT_MILESTONES.forEach((m, i) => { if (m.on.some(t => seenTypes.has(t))) { states[m.id] = 'done'; lastDone = i; } });
  // the milestone just after the last completed one is "active"
  const nextIdx = lastDone + 1;
  INCIDENT_MILESTONES.forEach((m, i) => {
    if (states[m.id] === 'done') { if (i === lastDone && !resolved) states[m.id] = 'active'; }
    else states[m.id] = i === nextIdx ? 'active' : 'pending';
  });
  if (resolved) INCIDENT_MILESTONES.forEach(m => { if (m.on.some(t => seenTypes.has(t))) states[m.id] = 'done'; });
  return { nodes, edges: INCIDENT_MS_EDGES, nodeStates: states };
}

const KIND_BY_EVENT = {
  TASK_FAILED: 'alert', FAILURE_INJECTED: 'alert',
  RISK_SCORE_UPDATED: 'risk', REPLAN_TRIGGERED: 'risk', FAILURE_CLEARED: 'risk',
  ACTION_CREATED: 'approval', DEMO_APPROVAL_REQUESTED: 'approval',
  ACTION_APPROVED: 'approval', ACTION_REJECTED: 'approval',
  TASK_COMPLETED: 'success', ACTION_EXECUTED: 'success', RESEARCH_SYNTHESIZED: 'success',
  RESOLUTION_MONITORING_STARTED: 'success',
  CONTEXT_ASSEMBLED: 'memory', REASONING_COMPLETE: 'memory', MISSION_CREATED: 'memory',
};
const AGENT_BY_EVENT = {
  RISK_SCORE_UPDATED: 'risk', REPLAN_TRIGGERED: 'risk', FAILURE_INJECTED: 'risk', FAILURE_CLEARED: 'risk',
  REASONING_COMPLETE: 'planner', RESEARCH_SYNTHESIZED: 'planner',
  ACTION_CREATED: 'orchestrator', ACTION_APPROVED: 'orchestrator', ACTION_REJECTED: 'orchestrator',
  DEMO_APPROVAL_REQUESTED: 'orchestrator', MISSION_STATUS_CHANGED: 'orchestrator', MISSION_CREATED: 'orchestrator',
  RESOLUTION_MONITORING_STARTED: 'auditor', TASK_FAILED: 'auditor',
};
function agentForEvent(ev) {
  if (AGENT_BY_EVENT[ev.event_type]) return AGENT_BY_EVENT[ev.event_type];
  const p = ev.payload || {};
  if (p.agent_role && AGENT_COLOR[p.agent_role]) return p.agent_role;
  const src = ev.source;
  if (src === 'mcp') return 'execution';
  if (src === 'failure_engine') return 'risk';
  if (src === 'user') return 'orchestrator';
  if (src === 'orchestrator') return 'orchestrator';
  return 'execution';
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
/* light, XSS-safe markdown: escape first, then add only our own bold/link/break tags */
function mdLite(s) {
  let h = esc(s);
  // URL char classes exclude " ' < > so a captured URL can't break out of the
  // href="" attribute context (the recommendation is model/web-derived, untrusted).
  h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s"'<>]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  h = h.replace(/(^|[\s(])(https?:\/\/[^\s)"'<>]+)/g, (m, pre, url) => `${pre}<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(^|\n)[ \t]*[*\-•][ \t]+/g, '$1• ');  // list bullets → clean •
  h = h.replace(/\n/g, '<br>');
  return h;
}
function num(v) { return `<span class="num">${esc(v)}</span>`; }
function em(v) { return `<span class="em">${esc(v)}</span>`; }

/* Humanize an event into a readable feed line (light emphasis only). */
function eventText(ev) {
  const p = ev.payload || {};
  switch (ev.event_type) {
    case 'MISSION_CREATED': return `Mission opened — ${em(p.goal || 'new goal')}.`;
    case 'MISSION_STATUS_CHANGED': return `Status ${em(p.from)} → ${em(p.to)}.`;
    case 'INCIDENT_DETECTED': return `Anomaly detected — ${em(p.title || p.problem_id || 'incident')}.`;
    case 'CONTEXT_ASSEMBLED': return `Context assembled · ${num(p.deployments != null ? p.deployments : 0)} deploys for ${em(p.service_id || 'service')}.`;
    case 'REASONING_COMPLETE': return `Reasoning complete — recommendation ${em(p.recommendation || 'ready')}${p.confidence != null ? ` · confidence ${num(p.confidence)}` : ''}.`;
    case 'TASK_STARTED': return `Task started.`;
    case 'TASK_COMPLETED': return `Task complete${p.tool ? ` via ${em(p.tool)}` : ''}.`;
    case 'TASK_FAILED': return `Task failed${p.reason ? ` — ${esc(p.reason)}` : ''}.`;
    case 'TASK_RETRYING': return `Retrying task · attempt ${num(p.retry_count || 1)}.`;
    case 'RISK_SCORE_UPDATED': return `Risk index ${num(Math.round((p.overall != null ? p.overall : 0) * 100))}.`;
    case 'REPLAN_TRIGGERED': return `${em('Tripping re-plan')} — ${esc(p.reason || 'risk too high')} (risk ${num(p.risk != null ? p.risk : '—')}).`;
    case 'FAILURE_INJECTED': return `${em('Chaos injected')} — ${esc(p.type || 'failure')} on ${em(p.target || 'tool')} (severity ${num(p.severity != null ? p.severity : '—')}).`;
    case 'FAILURE_CLEARED': return `Failure cleared — ${esc(p.type || 'failure')} resolved.`;
    case 'ACTION_CREATED': return `${em('Approval required')} — ${esc(p.type || p.action_type || 'action')}. Mirrored to Telegram.`;
    case 'DEMO_APPROVAL_REQUESTED': return `${em('Approval required')} — ${esc(p.action || 'action')}. Mirrored to Telegram.`;
    case 'ACTION_APPROVED': return `Approved${p.approved_by ? ` by ${em(p.approved_by)}` : ''}. Executing.`;
    case 'ACTION_REJECTED': return `Held by human — standing down.`;
    case 'ACTION_EXECUTED': return `Action executed.`;
    case 'RESOLUTION_MONITORING_STARTED': return `Watching metrics for recovery on ${em(p.service_id || 'service')}…`;
    case 'RESEARCH_SYNTHESIZED': return `${em('Recommendation ready')} — handed off for approval.`;
    default: {
      const keys = Object.keys(p).slice(0, 3).map(k => `${k}=${esc(typeof p[k] === 'object' ? JSON.stringify(p[k]).slice(0, 24) : p[k])}`).join(' · ');
      return `${esc(ev.event_type)}${keys ? ' · ' + keys : ''}`;
    }
  }
}

function translateEvent(ev) {
  if (!ev || !ev.event_type || FEED_NOISE.has(ev.event_type)) return null;
  return {
    id: ev.event_id, ts: ev.created_at,
    kind: KIND_BY_EVENT[ev.event_type] || 'signal',
    agent: agentForEvent(ev),
    text: eventText(ev),
    tool: (ev.payload && ev.payload.tool) || null,
    event_type: ev.event_type,
  };
}

/* ---------------- pending action → approval card ---------------- */
function actionToApproval(action) {
  if (!action) return null;
  const p = action.payload || {};
  const type = action.action_type;
  if (type === 'gitlab_rollback') {
    return {
      action_id: action.action_id, title: 'Roll back deployment',
      detail: `NERVE wants to <span class="em">revert ${esc(p.ref || 'the latest deploy')}</span> on <span class="em">${esc(p.environment || 'production')}</span> to stop the regression. Runs a GitLab rollback pipeline.`,
      rows: [
        ['Target', esc((p.environment || 'prod'))],
        ['Action', `Rollback ${esc(p.ref || '')}`.trim()],
        p.sha ? ['Commit', esc(String(p.sha).slice(0, 8))] : null,
        p.confidence != null ? ['Confidence', `${Math.round(p.confidence * 100)}%`] : null,
      ].filter(Boolean),
      approve: 'Approve rollback', reject: 'Hold', integration: 'GitLab pipeline',
      impact: p.impact || null,
    };
  }
  if (type === 'human_approval_request') {
    const rec = p.recommendation || '';
    const firstLine = rec.split('\n').filter(Boolean)[0] || 'Review the recommendation NERVE prepared.';
    return {
      action_id: action.action_id, title: 'Review recommendation',
      detail: esc(firstLine),
      rows: rec.split('\n').filter(Boolean).slice(0, 4).map(line => ['', line.replace(/^[-•]\s*/, '')]),
      approve: 'Approve', reject: 'Hold', integration: 'Hand-off',
      impact: p.impact || null,
      kind: 'result',          // research hand-off → show as a result modal
      recommendation: rec,     // full text for the modal
    };
  }
  return {
    action_id: action.action_id, title: `Approve ${esc(type)}`,
    detail: esc(JSON.stringify(p).slice(0, 160)),
    rows: Object.entries(p).filter(([k]) => k !== 'impact').slice(0, 4).map(([k, v]) => [k, esc(typeof v === 'object' ? JSON.stringify(v).slice(0, 28) : v)]),
    approve: 'Approve', reject: 'Hold', integration: 'Action', impact: p.impact || null,
  };
}

/* ---------------- backend API client ---------------- */
const Api = {
  async startDemo() { const r = await fetch('/demo/start'); return r.json(); },
  async createMission(goal, mission_type) {
    const r = await fetch('/missions', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal, mission_type }),
    });
    return r.json();
  },
  async getState(id) { const r = await fetch(`/missions/${id}`); if (!r.ok) throw new Error('state ' + r.status); return r.json(); },
  async listMissions() { try { const r = await fetch('/missions'); if (!r.ok) return []; const d = await r.json(); return (d && d.missions) || []; } catch (e) { return []; } },
  async approve(id) {
    return fetch(`/actions/${id}/approve`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ approved_by: 'dashboard' }),
    });
  },
  async reject(id) {
    return fetch(`/actions/${id}/reject`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ approved_by: 'dashboard', reason: 'held from dashboard' }),
    });
  },
  async injectChaos(missionId) {
    const body = { failure_type: 'CONTRADICTORY_METRICS', target: 'get_metrics', severity: 0.85, duration_seconds: 25 };
    return fetch(`/failure/inject?mission_id=${encodeURIComponent(missionId)}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
  },
};

/* known-missions roster (shared with the classic dashboard) */
function getKnown() { try { return JSON.parse(localStorage.getItem('nerve_missions') || '[]'); } catch { return []; } }
function addKnown(id, type) {
  const list = getKnown().filter(m => m.id !== id);
  list.unshift({ id, type, at: Date.now() });
  try { localStorage.setItem('nerve_missions', JSON.stringify(list.slice(0, 12))); } catch {}
}

window.NERVE = { AGENTS, ORCH, AGENT_COLOR, MISSIONS, FLEET_GHOSTS };
window.NERVE_LIVE = {
  mapPhase, isTerminal, nodeStateFor, buildGraph, buildMilestoneGraph,
  translateEvent, actionToApproval, beliefsToFacts, seriesToSparkline,
  Api, getKnown, addKnown, FEED_NOISE, mdLite,
};

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-source="extras.jsx">
/* NERVE — v2 surfaces: Sparkline, MemoryPanel, GoalLauncher, Fleet, audio */

/* ---------------- metric formatting ---------------- */
function fmtMetric(v, metric) {
  if (v == null) return '—';
  if (metric.unit === 'ms') return v >= 1000 ? (v / 1000).toFixed(1) + 's' : Math.round(v) + 'ms';
  if (metric.unit === '$') return '$' + Math.round(v).toLocaleString();
  return String(v);
}

/* ---------------- recovery sparkline ---------------- */
function Sparkline({ series, metric, baseline }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const cv = ref.current; if (!cv) return;
    const ctx = cv.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = cv.clientWidth, h = cv.clientHeight;
    cv.width = w * dpr; cv.height = h * dpr; ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);
    const data = series.filter(v => v != null);
    if (data.length < 2) return;
    const pad = 6;
    let mn = Math.min(...data), mx = Math.max(...data);
    if (baseline != null) mn = Math.min(mn, baseline);
    if (mx - mn < 1) mx = mn + 1;
    const X = i => pad + (i / (series.length - 1)) * (w - pad * 2);
    const Y = v => h - pad - ((v - mn) / (mx - mn)) * (h - pad * 2);

    // baseline guide
    if (baseline != null) {
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.setLineDash([3, 3]); ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(pad, Y(baseline)); ctx.lineTo(w - pad, Y(baseline)); ctx.stroke();
      ctx.setLineDash([]);
    }
    // trend colour: comparing last two real points
    const last = data[data.length - 1], prev = data[data.length - 2];
    const improving = metric.lowerBetter ? last <= prev : last >= prev;
    const settled = Math.abs(last - (baseline ?? last)) < (mx - mn) * 0.12;
    const col = settled ? '#46d39a' : (improving ? '#3fe0c5' : '#f4c25a');

    // build point list carrying last value through nulls
    let lastV = null; const pts = series.map((v, i) => { if (v != null) lastV = v; return lastV == null ? null : { x: X(i), y: Y(lastV) }; }).filter(Boolean);
    // area fill
    const g = ctx.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, col + '33'); g.addColorStop(1, col + '00');
    ctx.beginPath(); ctx.moveTo(pts[0].x, h - pad);
    pts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(pts[pts.length - 1].x, h - pad); ctx.closePath();
    ctx.fillStyle = g; ctx.fill();
    // line
    ctx.beginPath(); pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
    ctx.strokeStyle = col; ctx.lineWidth = 1.6; ctx.lineJoin = 'round'; ctx.shadowColor = col; ctx.shadowBlur = 6; ctx.stroke(); ctx.shadowBlur = 0;
    // head dot
    const hd = pts[pts.length - 1];
    ctx.fillStyle = col; ctx.beginPath(); ctx.arc(hd.x, hd.y, 2.4, 0, 7); ctx.fill();
  }, [series, baseline, metric]);

  const lastReal = [...series].reverse().find(v => v != null);
  const lastV = lastReal == null ? null : lastReal;
  const prevReal = [...series].reverse().filter(v => v != null)[1];
  const improving = lastV != null && prevReal != null && (metric.lowerBetter ? lastV <= prevReal : lastV >= prevReal);
  const col = lastV == null ? 'var(--text-mid)' : (improving ? '#3fe0c5' : '#f4c25a');
  return (
    <div className="spark">
      <div className="spark-row">
        <span className="lbl">{metric.label}</span>
        <span className="val" style={{ color: col }}>{fmtMetric(lastV, metric)}</span>
      </div>
      <canvas ref={ref} className="spark-canvas" />
    </div>
  );
}

/* ---------------- shared-memory panel ---------------- */
function MemoryPanel({ facts }) {
  return (
    <div className="panel">

/* ---------------- goal launcher (front door) ---------------- */
function GoalLauncher({ mission, onLaunch }) {

/* ---------------- ambient audio ---------------- */
const NerveAudio = {
  ctx: null, enabled: false,
  ensure() { if (!this.ctx) { try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return this.ctx; },
  play(type) {
    if (!this.enabled) return;
    const ctx = this.ensure(); if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const tones = {
      alert:   [{ f: 340, t: 0 }, { f: 300, t: 0.14 }],
      approve: [{ f: 540, t: 0 }, { f: 760, t: 0.1 }],
      resolve: [{ f: 520, t: 0 }, { f: 680, t: 0.1 }, { f: 880, t: 0.2 }],
      reject:  [{ f: 300, t: 0 }],
      tick:    [{ f: 660, t: 0 }],
    };
    const seq = tones[type] || tones.tick;
    seq.forEach(({ f, t }) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type === 'alert' ? 'sawtooth' : 'sine';
      o.frequency.value = f;
      const st = now + t;
      const vol = type === 'tick' ? 0.04 : 0.10;
      g.gain.setValueAtTime(0, st);
      g.gain.linearRampToValueAtTime(vol, st + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, st + 0.22);
      o.connect(g); g.connect(ctx.destination);
      o.start(st); o.stop(st + 0.24);
    });
  },
};

window.Fleet = Fleet;
window.NerveAudio = NerveAudio;
