<script type="text/babel" data-source="Vitals.jsx">
/* NERVE — Vitals: ECG heartbeat (canvas) + confidence + agent hub */

const VITAL_BANDS = [
  { max: 22,  name: 'calm',     color: '#46d39a' },
  { max: 50,  name: 'steady',   color: '#3fe0c5' },
  { max: 72,  name: 'elevated', color: '#f4c25a' },
  { max: 101, name: 'critical', color: '#ff6a72' },
];
function bandFor(risk) {
  return VITAL_BANDS.find(b => risk < b.max) || VITAL_BANDS[VITAL_BANDS.length - 1];
}

/* PQRST-ish single-beat waveform, t in [0,1) */
function ecgWave(t) {
  const g = (mu, v) => Math.exp(-((t - mu) * (t - mu)) / (2 * v));
  return (
    0.13 * g(0.16, 0.0016)   // P
    - 0.11 * g(0.255, 0.0004) // Q
    + 1.00 * g(0.288, 0.00028) // R
    - 0.24 * g(0.318, 0.0006)  // S
    + 0.28 * g(0.49, 0.0030)   // T
  );
}

function ECG({ risk, running }) {
  const canvasRef = React.useRef(null);
  const stateRef = React.useRef({ buf: null, phase: 0, accum: 0, last: 0, risk: risk });
  stateRef.current.targetRisk = risk;
  stateRef.current.running = running;

  React.useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let raf;
    const st = stateRef.current;

    function size() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const w = canvas.clientWidth, h = canvas.clientHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      st.W = w; st.H = h;
      st.buf = new Array(Math.ceil(w)).fill(0);
    }
    size();
    const ro = new ResizeObserver(size); ro.observe(canvas);

    const PX_PER_SEC = 78;
    function frame(ts) {
      if (!st.last) st.last = ts;
      let dt = (ts - st.last) / 1000; st.last = ts;
      if (dt > 0.1) dt = 0.1;
      // ease displayed risk toward target
      st.risk += (st.targetRisk - st.risk) * Math.min(1, dt * 3);
      const r = st.risk;
      const bpm = 56 + r * 1.02;
      const phasePerPx = (bpm / 60) / PX_PER_SEC;
      const noise = (r / 100) * 0.05;
      const amp = st.H * 0.34;

      const W = st.W, H = st.H, mid = H * 0.56;
      // advance buffer
      let px = st.running ? PX_PER_SEC * dt + st.accum : st.accum;
      let whole = Math.floor(px);
      st.accum = px - whole;
      if (whole > W) whole = W;
      for (let i = 0; i < whole; i++) {
        st.phase += phasePerPx;
        if (st.phase >= 1) st.phase -= 1;
        let y = ecgWave(st.phase) * amp;
        if (noise) y += (Math.random() - 0.5) * noise * amp * 2;
        st.buf.push(y);
        if (st.buf.length > W) st.buf.shift();
      }

      const band = bandFor(r);
      const col = band.color;
      // draw
      ctx.clearRect(0, 0, W, H);
      // faint centerline
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();

      const buf = st.buf;
      const n = buf.length;
      // glow trace
      ctx.lineJoin = 'round'; ctx.lineCap = 'round';
      ctx.shadowColor = col; ctx.shadowBlur = 9;
      ctx.strokeStyle = col; ctx.lineWidth = 1.7;
      ctx.beginPath();
      for (let i = 0; i < n; i++) {
        const x = W - (n - 1 - i);
        const y = mid - buf[i];
        // fade older samples by drawing a gradient? keep simple: skip
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // leading dot
      if (n) {
        const y = mid - buf[n - 1];
        ctx.fillStyle = col;
        ctx.beginPath(); ctx.arc(W - 1, y, 2.4, 0, 7); ctx.fill();
      }
      // left fade mask
      const grd = ctx.createLinearGradient(0, 0, W * 0.18, 0);
      grd.addColorStop(0, 'rgba(6,9,11,1)');
      grd.addColorStop(1, 'rgba(6,9,11,0)');
      ctx.fillStyle = grd; ctx.fillRect(0, 0, W * 0.18, H);

      raf = requestAnimationFrame(frame);
    }
    raf = requestAnimationFrame(frame);
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, []);

  const band = bandFor(risk);
  const bpm = Math.round(56 + risk * 1.02);
  return (
    <div className="ecg-wrap">
      <canvas ref={canvasRef} className="ecg-canvas" />
      <div className="ecg-readout">
        <span className="big tnum" style={{ color: band.color }}>{Math.round(risk)}</span>
        <span className="unit">RISK<br/>INDEX</span>
      </div>
      <div className="ecg-band" style={{ color: band.color }}>{band.name}</div>
      <div className="ecg-bpm tnum">{bpm} bpm</div>
    </div>
  );
}

/* central orchestrator + 4 agents, signals fire into the hub */
function AgentHub({ activeAgent, fireKey, agents }) {
  const POS = {
    planner:   { x: 44,  y: 40 },
    execution: { x: 156, y: 40 },
    risk:      { x: 44,  y: 140 },
    auditor:   { x: 156, y: 140 },
  };
  const C = { x: 100, y: 90 };
  return (
    <svg className="hub-svg" viewBox="0 0 200 180" fill="none">
      {/* edges */}
      {agents.map(a => {
        const p = POS[a.id];
        const on = activeAgent === a.id;
        return (
          <line key={'e' + a.id} x1={p.x} y1={p.y} x2={C.x} y2={C.y}
            stroke={on ? a.color : 'rgba(120,200,190,0.12)'} strokeWidth={on ? 1.3 : 1}
            style={{ transition: 'stroke .3s', opacity: on ? 0.85 : 0.5 }} />
        );
      })}
      {/* traveling signal pulse */}
      {activeAgent && POS[activeAgent] && (
        <circle key={fireKey} r="3"
          fill={(agents.find(a => a.id === activeAgent) || {}).color || '#3fe0c5'}>
          <animate attributeName="cx" from={POS[activeAgent].x} to={C.x} dur="0.6s" fill="freeze" />
          <animate attributeName="cy" from={POS[activeAgent].y} to={C.y} dur="0.6s" fill="freeze" />
          <animate attributeName="opacity" from="1" to="0.15" dur="0.6s" fill="freeze" />
          <animate attributeName="r" from="3.4" to="1.5" dur="0.6s" fill="freeze" />
        </circle>
      )}
      {/* orchestrator core */}
      <circle cx={C.x} cy={C.y} r="20" fill="rgba(63,224,197,0.04)" stroke="rgba(120,200,190,0.18)" />
      <circle cx={C.x} cy={C.y} r="11" fill="rgba(8,12,14,0.9)" stroke="rgba(120,200,190,0.35)">
        <animate attributeName="r" values="11;13;11" dur="2.6s" repeatCount="indefinite" />
      </circle>
      <circle cx={C.x} cy={C.y} r="3.4" fill="#dcebe8">
        <animate attributeName="opacity" values="1;0.5;1" dur="2.6s" repeatCount="indefinite" />
      </circle>
      <text x={C.x} y={C.y + 33} textAnchor="middle" fontFamily="'IBM Plex Mono', monospace"
        fontSize="7" letterSpacing="1.4" fill="#5d6e6c">ORCHESTRATOR</text>
      {/* agent nodes */}
      {agents.map(a => {
        const p = POS[a.id];
        const on = activeAgent === a.id;
        return (
          <g key={a.id}>
            <circle cx={p.x} cy={p.y} r={on ? 9 : 7}
              fill={on ? a.color : 'rgba(8,12,14,0.9)'}
              stroke={a.color} strokeWidth="1.3"
              style={{ transition: 'all .3s', filter: on ? `drop-shadow(0 0 8px ${a.color})` : 'none' }} />
            <circle cx={p.x} cy={p.y} r="2.4" fill={on ? '#06090b' : a.color} style={{ transition: 'fill .3s' }} />
          </g>
        );
      })}
    </svg>
  );
}

function Vitals({ risk, confidence, running, activeAgent, fireKey, agents, agentStatus, replans, actions, series, metric, baseline, coherence }) {
  const confCol = confidence > 70 ? '#46d39a' : confidence > 45 ? '#3fe0c5' : confidence > 25 ? '#f4c25a' : '#ff6a72';
  const cohCol = coherence === 'reconciling' ? '#f4c25a' : '#46d39a';
  return (
    <>
      <div className="panel">
        <div className="panel-hd"><span className="ttl">Vitals</span>
          <span className="eyebrow" style={{ color: running ? '#46d39a' : '#5d6e6c' }}>{running ? '● live' : '○ paused'}</span>
        </div>
        <ECG risk={risk} running={running} />
        <div className="meter">
          <div className="meter-row"><span className="lbl">Confidence</span><span className="val tnum">{Math.round(confidence)}%</span></div>
          <div className="meter-track"><div className="meter-fill" style={{ width: confidence + '%', background: confCol }} /></div>
        </div>
        {series && <Sparkline series={series} metric={metric} baseline={baseline} />}
        <div style={{ display: 'flex', gap: 18, marginTop: 16, alignItems: 'flex-end' }}>
          <div className="statchip"><span className="k">Actions</span><span className="v tnum">{actions}</span></div>
          <div className="statchip"><span className="k">Re-plans</span><span className="v tnum" style={{ color: replans ? '#f4c25a' : undefined }}>{replans}</span></div>
          <div className="statchip" style={{ marginLeft: 'auto' }}><span className="k">State</span>
            <span className="coh"><span className="cd" style={{ background: cohCol, boxShadow: `0 0 7px ${cohCol}` }} />{coherence === 'reconciling' ? 'reconciling' : 'coherent'}</span>
          </div>
        </div>
      </div>

      <div className="panel">
        <div className="panel-hd"><span className="ttl">Agents</span><span className="eyebrow">via orchestrator</span></div>
        <div className="hub-wrap">
          <AgentHub activeAgent={activeAgent} fireKey={fireKey} agents={agents} />
          <div className="agent-legend">
            {agents.map(a => (
              <div className="agent-row" key={a.id} data-active={activeAgent === a.id}>
                <span className="ad" style={{ background: a.color, boxShadow: activeAgent === a.id ? `0 0 8px ${a.color}` : 'none' }} />
                <span className="an">{a.name}</span>
                <span className="as">{a.role}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

window.Vitals = Vitals;

</script>
<script type="text/babel" data-source="MissionGraph.jsx">
/* NERVE — Mission graph. Nodes light up; signals fire down edges. */

function edgePath(s, t) {
  const dx = t.x - s.x;
  const c = Math.max(40, Math.abs(dx) * 0.5);
  return `M ${s.x} ${s.y} C ${s.x + c} ${s.y} ${t.x - c} ${t.y} ${t.x} ${t.y}`;
}

function MissionGraph({ mission, nodeStates, fireKey, activeNode, tension }) {
  const stageRef = React.useRef(null);
  const [dim, setDim] = React.useState({ w: 760, h: 460 });

  React.useEffect(() => {
    const el = stageRef.current;
    const ro = new ResizeObserver(() => {
      setDim({ w: el.clientWidth, h: el.clientHeight });
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  const px = (n) => ({ x: (n.x / 100) * dim.w, y: (n.y / 100) * dim.h });
  const byId = {};
  mission.nodes.forEach(n => byId[n.id] = n);

  const visible = (id) => {
    const st = nodeStates[id] || 'pending';
    const node = byId[id];
    if (st === 'hidden') return false;
    if (node && node.chaos && st === 'pending') return false;
    return true;
  };

  const allEdges = [...mission.edges, ...(mission.chaosEdges || [])];

  return (
    <div className="graph-stage" ref={stageRef} data-tension={tension ? 'high' : 'low'}>
      <svg className="graph-svg" viewBox={`0 0 ${dim.w} ${dim.h}`} preserveAspectRatio="none">
        <defs>
          <filter id="edgeglow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2.4" result="b" />
            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
        </defs>
        {allEdges.map(([a, b], i) => {
          if (!visible(a) || !visible(b)) return null;
          const s = px(byId[a]), t = px(byId[b]);
          const sState = nodeStates[a] || 'pending';
          const tState = nodeStates[b] || 'pending';
          const d = edgePath(s, t);
          const lit = sState === 'done' || sState === 'alert';
          const targetActive = tState === 'active' || tState === 'approval' || tState === 'alert';
          let col = 'rgba(120,200,190,0.13)';
          if (lit) col = '#2f6f66';
          if (lit && targetActive) {
            if (tState === 'approval') col = '#8a6d2e';
            else if (tState === 'alert') col = '#8a3b3f';
            else col = '#3fe0c5';
          }
          return (
            <path key={a + b} d={d} fill="none" stroke={col}
              strokeWidth={lit ? 1.5 : 1}
              style={{ transition: 'stroke .4s, stroke-width .4s' }} />
          );
        })}
        {/* traveling pulse on edges leading into the active node */}
        {activeNode && allEdges.filter(([a, b]) => b === activeNode && visible(a) && visible(b) && (nodeStates[a] === 'done' || nodeStates[a] === 'alert'))
          .map(([a, b]) => {
            const s = px(byId[a]), t = px(byId[b]);
            const d = edgePath(s, t);
            const st = nodeStates[b];
            const col = st === 'approval' ? '#f4c25a' : st === 'alert' ? '#ff6a72' : '#3fe0c5';
            return (
              <g key={fireKey + a + b}>
                <circle r="3.2" fill={col} style={{ filter: `drop-shadow(0 0 5px ${col})` }}>
                  <animateMotion dur="0.65s" fill="freeze" path={d} />
                  <animate attributeName="opacity" from="1" to="0.2" dur="0.65s" fill="freeze" />
                </circle>
              </g>
            );
          })}
      </svg>

      {mission.nodes.map(n => {
        if (!visible(n.id)) return null;
        const st = nodeStates[n.id] || 'pending';
        const p = { left: n.x + '%', top: n.y + '%' };
        const agentColor = window.NERVE.AGENT_COLOR[n.agent] || '#5d6e6c';
        return (
          <div key={n.id} className={'gnode' + (n.chaos ? ' chaos-born' : '')} data-state={st} style={p}>
            <div className="gn-top">
              <Icon name={n.icon} className="gn-ic" />
              <span className="gn-agent" style={{ color: (st === 'active' || st === 'approval' || st === 'alert') ? agentColor : undefined }}>
                {n.agent === 'orchestrator' ? 'HUMAN' : n.agent}
              </span>
            </div>
            <div className="gn-label">{n.label}</div>
            <div className="gn-status"><i /></div>
          </div>
        );
      })}
    </div>
  );
}

window.MissionGraph = MissionGraph;

</script>
<script type="text/babel" data-source="EventFeed.jsx">
/* NERVE — Live event feed with token-streaming on the newest line. */

function stripTags(html) {
  return html.replace(/<[^>]+>/g, '');
}

function EventFeed({ events }) {
  const ref = React.useRef(null);
  const [typed, setTyped] = React.useState({ seq: -1, len: 0, done: true });
  const timerRef = React.useRef(null);

  const last = events[events.length - 1];

  // start a typewriter pass whenever a new last-event arrives
  React.useEffect(() => {
    if (!last) return;
    if (last.seq === typed.seq) return;
    clearInterval(timerRef.current);
    const plain = stripTags(last.text);
    const step = Math.max(1, Math.ceil(plain.length / 40));
    setTyped({ seq: last.seq, len: 0, done: false });
    timerRef.current = setInterval(() => {
      setTyped(prev => {
        const nl = prev.len + step;
        if (nl >= plain.length) { clearInterval(timerRef.current); return { seq: last.seq, len: plain.length, done: true }; }
        return { ...prev, len: nl };
      });
    }, 18);
    return () => clearInterval(timerRef.current);
  }, [last && last.seq]); // eslint-disable-line

  React.useEffect(() => {
    const el = ref.current; if (el) el.scrollTop = el.scrollHeight;
  }, [events.length, typed.len]);

  return (
    <>
      <div className="panel-hd" style={{ padding: '18px 20px 12px', margin: 0, borderBottom: '1px solid var(--line)' }}>
        <span className="ttl">Reasoning feed</span>
        <span className="eyebrow">{events.length} events</span>
      </div>
      <div className="feed" ref={ref}>
        {events.length === 0 && (
          <div className="feed-empty">Awaiting a goal…</div>
        )}
        {events.map((e) => {
          const col = window.NERVE.AGENT_COLOR[e.agent] || '#5d6e6c';
          const name = e.agent === 'orchestrator' ? 'Orchestrator' : e.agent[0].toUpperCase() + e.agent.slice(1);
          const isLast = last && e.seq === last.seq;
          const typing = isLast && typed.seq === e.seq && !typed.done;
          return (
            <div className="evt" data-kind={e.kind} key={e.seq}>
              <div className="evt-rail"><span className="line" /><span className="dot" /></div>
              <div className="evt-body">
                <div className="evt-meta">
                  <span className="evt-agent" style={{ color: col }}>{name}</span>
                  <span className="evt-time tnum">{e.time}</span>
                </div>
                {typing
                  ? <div className="evt-text">{stripTags(e.text).slice(0, typed.len)}<span className="caret" /></div>
                  : <div className="evt-text" dangerouslySetInnerHTML={{ __html: e.text }} />}
                {e.tool && !typing && <div className="evt-tool"><span className="tg" />{e.tool}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </>
  );
}

window.EventFeed = EventFeed;

</script>
<script type="text/babel" data-source="Approval.jsx">
/* NERVE — Approval moment: dashboard dock card + Telegram phone mirror */

function ImpactViz({ impact }) {
  if (!impact) return null;
  if (impact.kind === 'pods') {
    return (
      <div className="ac-impact">
        <div className="ai-top"><span className="ai-lbl">Blast radius — {impact.label}</span><span className="ai-sub">{impact.sub}</span></div>

          {Array.from({ length: impact.total }).map((_, i) => (
            <i key={i} className={i < impact.hit ? 'hit' : ''} style={{ animationDelay: (i * 28) + 'ms' }} />
          ))}
        </div>

    );
  }
  if (impact.kind === 'cost') {
    return (
      <div className="ac-impact">

        <div className="ac-cost">
          <span className="acc-amt">{impact.amount}</span>
          <span className="acc-meta">Placed as a temporary hold.<br/>Released automatically if unused.</span>
        </div>

}

function ApprovalDock({ approval, onApprove, onReject }) {

        <h3 className="ac-title">{approval.title}</h3>

          <CtrlIcon name="phone" />
          Also sent to your phone · one-tap on Telegram
        </div>

}

function TelegramPhone({ open, approval, status, onApprove, onReject, onClose }) {
  if (!open) return null;
  return (
    <div className="phone">
      <button className="phone-close" onClick={onClose}>✕</button>
      <div className="phone-screen">
        <div className="tg-bar">

            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#06090b" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M8 1.4l5 1.8v4c0 3.4-2.2 5.8-5 7.2-2.8-1.4-5-3.8-5-7.2v-4z" />
              <path d="M5.6 8.2l1.7 1.7 3-3.4" />
            </svg>
          </div>
          <div>
            <div className="tg-nm">NERVE</div>
            <div className="tg-sub">bot · online</div>
          </div>
        </div>
        <div className="tg-body">
          {status === 'pending' && approval && (
            <div className="tg-bubble">
              <div className="tgb-h"><span style={{ width: 6, height: 6, borderRadius: 9, background: '#f4c25a', display: 'inline-block' }} />Approval needed</div>
              <div className="tgb-t">{approval.title}</div>
              <div className="tgb-d" dangerouslySetInnerHTML={{ __html: approval.detail.replace(/<span class="[^"]*">/g, '').replace(/<\/span>/g, '') }} />
              <div className="tgb-btns">
                <div className="tgb-b n" onClick={onReject}>{approval.reject}</div>
                <div className="tgb-b y" onClick={onApprove}>✓ {approval.approve}</div>
              </div>
              <div className="tg-time">now</div>
            </div>
          )}
          {status === 'approved' && (
            <div className="tg-bubble">
              <div className="tgb-h" style={{ color: '#46d39a' }}><span style={{ width: 6, height: 6, borderRadius: 9, background: '#46d39a', display: 'inline-block' }} />Approved by you</div>
              <div className="tgb-d" style={{ margin: 0 }}>Executing now — I'll report back when it's done.</div>
              <div className="tg-time">now ✓✓</div>

          )}
          {status === 'rejected' && (
            <div className="tg-bubble">
              <div className="tgb-h" style={{ color: '#ff6a72' }}><span style={{ width: 6, height: 6, borderRadius: 9, background: '#ff6a72', display: 'inline-block' }} />Held</div>
              <div className="tgb-d" style={{ margin: 0 }}>Standing down. No action taken — your call.</div>
              <div className="tg-time">now</div>

}

window.ApprovalDock = ApprovalDock;
window.TelegramPhone = TelegramPhone;

</script>
<script type="text/babel" data-source="live-app.jsx">
/* ============================================================
   NERVE — LIVE dashboard (SP1)
   Same component tree as the scripted showcase, but every surface
   is driven by the real backend: POST /missions · GET /demo/start ·
   GET /missions/{id} · WebSocket /ws/{id} · /actions/{id}/approve|reject ·
   /failure/inject. Memory / sparkline / blast stay empty (SP2/SP3).
   ============================================================ */
const { useState, useRef, useEffect, useCallback } = React;
const L = window.NERVE_LIVE;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "autoChaos": false,
  "phoneDefault": false,
  "sound": false
}/*EDITMODE-END*/;

function bandColor(r) {
  if (r < 22) return '#46d39a';
  if (r < 50) return '#3fe0c5';
  if (r < 72) return '#f4c25a';
  return '#ff6a72';
}
function clock(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}
const STATE_EVENTS = new Set([
  'TASK_STARTED', 'TASK_COMPLETED', 'TASK_FAILED', 'TASK_RETRYING',
  'MISSION_STATUS_CHANGED', 'ACTION_CREATED', 'ACTION_APPROVED', 'ACTION_REJECTED',
  'ACTION_EXECUTED', 'DEMO_APPROVAL_REQUESTED', 'REPLAN_TRIGGERED',
  'RISK_SCORE_UPDATED', 'FAILURE_INJECTED', 'FAILURE_CLEARED', 'RESEARCH_SYNTHESIZED',
  'BELIEF_UPDATED', 'METRIC_SAMPLE',
]);
const POLL_MS = 4000;

/* Center-screen result modal shown when a research mission produces its hand-off. */
function ResultModal({ open, goal, recommendation, onApprove, onReject, onClose }) {
  if (!open) return null;
  return (
    <div className="result-overlay" onClick={onClose}>
      <div className="result-card" onClick={(e) => e.stopPropagation()}>
        <button className="result-close" onClick={onClose} aria-label="Close">✕</button>
        <div className="result-icon"><Icon name="check" /></div>
        <div className="result-badge">Research complete</div>
        {goal && <div className="result-goal">{goal}</div>}
        <div className="result-body" dangerouslySetInnerHTML={{ __html: L.mdLite(recommendation || '') }} />
        <div className="result-actions">
          <button className="ac-btn reject" onClick={onReject}>Hold</button>
          <button className="ac-btn approve" onClick={onApprove}>Approve</button>
        </div>
        <div className="result-hint"><CtrlIcon name="phone" />Also sent to your phone via Telegram</div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('incident');
  const preset = window.NERVE.MISSIONS[view];

  const [stage, setStage] = useState('idle');         // idle | launching | running
  const [graph, setGraph] = useState({ nodes: [], edges: [] });
  const [nodeStates, setNodeStates] = useState({});
  const [events, setEvents] = useState([]);
  const [phase, setPhase] = useState('Ready');
  const [status, setStatus] = useState('pending');
  const [targetRisk, setTargetRisk] = useState(6);
  const [dispRisk, setDispRisk] = useState(6);
  const [activeAgent, setActiveAgent] = useState(null);
  const [activeNode, setActiveNode] = useState(null);
  const [fireKey, setFireKey] = useState(0);
  const [actions, setActions] = useState(0);
  const [replans, setReplans] = useState(0);
  const [approval, setApproval] = useState(null);
  const [done, setDone] = useState(false);
  const [phoneOpen, setPhoneOpen] = useState(false);
  const [phoneStatus, setPhoneStatus] = useState('idle');
  const [connected, setConnected] = useState(false);
  const [memory, setMemory] = useState([]);
  const [metricSeries, setMetricSeries] = useState([]);
  const [metricMeta, setMetricMeta] = useState(null);
  const [fleetMissions, setFleetMissions] = useState([]);
  const [goalText, setGoalText] = useState('');  // the real goal of the running mission
  const [resultOpen, setResultOpen] = useState(false);  // research result modal
  const resultSeen = useRef(null);

  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const ids = useRef({ incident: null, research: null });
  const sock = useRef(null);
  const pollRef = useRef(null);
  const reconnRef = useRef(null);
  const seen = useRef(new Set());
  const seenTypes = useRef(new Set());
  const seqRef = useRef(0);
  const startRef = useRef(0);
  const startedRef = useRef(false);
  const viewRef = useRef(view); viewRef.current = view;
  const riskRef = useRef(6);
  const counts = useRef({ actions: 0, replans: 0 });
  const fetchTimer = useRef(null);
  const autoPhone = useRef(false);

  /* ---- eased risk ---- */
  useEffect(() => {
    let raf, last;
    const loop = (ts) => {
      if (!last) last = ts;
      const dt = Math.min(0.05, (ts - last) / 1000); last = ts;
      riskRef.current += (targetRisk - riskRef.current) * Math.min(1, dt * 3.2);
      setDispRisk(p => (Math.abs(riskRef.current - p) > 0.4 ? riskRef.current : p));
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [targetRisk]);

  useEffect(() => {
    NerveAudio.enabled = !!t.sound;
    if (t.sound) { const c = NerveAudio.ensure(); if (c && c.state === 'suspended') c.resume(); }
  }, [t.sound]);

  /* ---- teardown helpers ---- */
  const closeSock = useCallback(() => {
    clearTimeout(reconnRef.current); clearInterval(pollRef.current); clearTimeout(fetchTimer.current);
    if (sock.current) { try { sock.current.onclose = null; sock.current.close(); } catch (e) {} sock.current = null; }
    setConnected(false);
  }, []);

  const resetRender = useCallback(() => {
    seen.current = new Set(); seenTypes.current = new Set(); seqRef.current = 0; counts.current = { actions: 0, replans: 0 };
    startRef.current = 0; startedRef.current = false;
    setGraph({ nodes: [], edges: [] }); setNodeStates({}); setEvents([]);
    setPhase('Ready'); setStatus('pending'); setTargetRisk(6); riskRef.current = 6; setDispRisk(6);
    setActiveAgent(null); setActiveNode(null); setFireKey(0);
    setActions(0); setReplans(0); setApproval(null); setDone(false); setPhoneStatus('idle'); autoPhone.current = false;
    setMemory([]); setMetricSeries([]); setMetricMeta(null); setGoalText('');
    setResultOpen(false); resultSeen.current = null;
  }, []);

  /* ---- apply a full backend state snapshot ---- */
  const applyState = useCallback((data) => {
    if (!data || !data.mission) return;
    /* seed feed once (also fills seenTypes) BEFORE deriving the graph */
    if (!startedRef.current && data.recent_events && data.recent_events.length) {
      [...data.recent_events].reverse().forEach(ingestRaw);
    }
    const st = data.mission.status;
    if (data.mission.goal) setGoalText(data.mission.goal);
    const resolved = L.isTerminal(st);
    const tasks = data.tasks || [];
    if (tasks.length) {
      setGraph(L.buildGraph(tasks));
      const ns = {}; tasks.forEach(tk => { ns[tk.task_id] = L.nodeStateFor(tk.status); }); setNodeStates(ns);
      const inProg = tasks.find(tk => tk.status === 'in_progress' || tk.status === 'retrying');
      setActiveNode(inProg ? inProg.task_id : null);
    } else {
      /* no task rows (e.g. the scripted incident demo) → light a milestone graph from real events */
      const mg = L.buildMilestoneGraph(seenTypes.current, resolved);
      setGraph({ nodes: mg.nodes, edges: mg.edges }); setNodeStates(mg.nodeStates);
      const act = mg.nodes.find(n => mg.nodeStates[n.id] === 'active');
      setActiveNode(act ? act.id : null);
    }
    if (typeof data.risk === 'number') setTargetRisk(Math.round(data.risk * 100));
    setMemory(L.beliefsToFacts(data.beliefs));
    const sp = L.seriesToSparkline(data.metric_series);
    setMetricSeries(sp.values); setMetricMeta(sp.meta);
    setStatus(st); setPhase(L.mapPhase(st)); setDone(resolved);
    const pa = (data.pending_actions || [])[0];
    const ap = pa ? L.actionToApproval(pa) : null;
    setApproval(ap);
    if (pa) {
      setPhoneStatus('pending');
      if (ap && ap.kind === 'result') {
        // research hand-off → pop the result modal once (don't hijack the phone)
        if (resultSeen.current !== pa.action_id) { resultSeen.current = pa.action_id; setResultOpen(true); }
      } else {
        setPhoneOpen(o => { if (!o) autoPhone.current = true; return true; });
      }
    } else {
      setPhoneStatus(s => (s === 'pending' ? 'idle' : s));
      if (autoPhone.current && !t.phoneDefault) { autoPhone.current = false; setPhoneOpen(false); }
    }
  }, [t.phoneDefault]); // ingestRaw referenced via closure (stable useCallback)

  /* ---- ingest one raw backend event ---- */
  const ingestRaw = useCallback((ev) => {
    if (!ev || !ev.event_id || seen.current.has(ev.event_id)) return;
    seen.current.add(ev.event_id);
    if (ev.event_type) seenTypes.current.add(ev.event_type);
    if (ev.event_type === 'REPLAN_TRIGGERED') { counts.current.replans += 1; setReplans(counts.current.replans); }
    if (ev.event_type === 'ACTION_EXECUTED' || ev.event_type === 'TASK_COMPLETED') { counts.current.actions += 1; setActions(counts.current.actions); }
    const item = L.translateEvent(ev);
    if (!item) return;
    if (!startRef.current) startRef.current = ev.created_at ? Date.parse(ev.created_at) : Date.now();
    seqRef.current += 1;
    const tms = ev.created_at ? Date.parse(ev.created_at) : Date.now();
    const row = { ...item, seq: seqRef.current, time: clock(tms - startRef.current) };
    setEvents(prev => [...prev, row]);
    setActiveAgent(item.agent); setFireKey(k => k + 1);
    if (item.kind === 'alert') NerveAudio.play('alert');
    if (item.kind === 'approval') NerveAudio.play('approve');
  }, []);

  const scheduleFetch = useCallback((id) => {
    clearTimeout(fetchTimer.current);
    fetchTimer.current = setTimeout(() => {
      L.Api.getState(id).then(applyState).catch(() => {});
    }, 260);
  }, [applyState]);

  /* ---- connect WS + poll for a mission id ---- */
  const connect = useCallback((id) => {
    closeSock();
    L.Api.getState(id).then(applyState).catch(() => {});
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    try { sock.current = new WebSocket(`${proto}://${location.host}/ws/${id}`); }
    catch (e) { return; }
    sock.current.onopen = () => setConnected(true);
    sock.current.onmessage = (m) => {
      let ev; try { ev = JSON.parse(m.data); } catch (e) { return; }
      ingestRaw(ev);
      if (STATE_EVENTS.has(ev.event_type)) scheduleFetch(id);
      startedRef.current = true;
    };
    sock.current.onclose = () => {
      setConnected(false);
      if (viewRef.current && ids.current[viewRef.current] === id) {
        reconnRef.current = setTimeout(() => connect(id), 1800);
      }
    };
    pollRef.current = setInterval(() => L.Api.getState(id).then(applyState).catch(() => {}), POLL_MS);
  }, [applyState, ingestRaw, scheduleFetch, closeSock]);

  /* ---- view change: show that preset's mission or the front door ---- */
  useEffect(() => {
    closeSock(); resetRender();
    const id = ids.current[view];
    if (id) { setStage('running'); startedRef.current = false; connect(id); }
    else { setStage('idle'); }
    setPhoneOpen(!!t.phoneDefault);
    return () => closeSock();
  }, [view]); // eslint-disable-line

  /* ---- launch a mission from the front door ---- */
  const launch = useCallback(async (presetId, text) => {
    const m = window.NERVE.MISSIONS[presetId];
    if (m.launch !== 'demo' && text) setGoalText(text);  // show the user's goal immediately
    setStage('launching'); setPhase('Planning'); setActiveAgent('planner');
    try {
      const res = m.launch === 'demo' ? await L.Api.startDemo() : await L.Api.createMission(text, m.mission_type);
      const id = res && res.mission_id;
      if (!id) { setStage('idle'); return; }
      ids.current[presetId] = id; L.addKnown(id, m.mission_type);
      if (viewRef.current !== presetId) { setView(presetId); return; }
      resetRender(); setStage('running'); connect(id);
    } catch (e) { setStage('idle'); }
  }, [connect, resetRender]);

  /* ---- approval handlers (real API) ---- */
  const curId = () => ids.current[viewRef.current];
  const onApprove = () => {
    const a = approval; if (!a) return;
    setApproval(null); setPhoneStatus('approved');
    L.Api.approve(a.action_id).finally(() => scheduleFetch(curId()));
  };
  const onReject = () => {
    const a = approval; if (!a) return;
    NerveAudio.play('reject');
    setApproval(null); setPhoneStatus('rejected');
    L.Api.reject(a.action_id).finally(() => scheduleFetch(curId()));
  };
  const chaos = () => {
    const id = curId(); if (!id) return;
    L.Api.injectChaos(id).finally(() => scheduleFetch(id));
  };

  const restart = () => { const id = curId(); if (id) { resetRender(); setStage('running'); startedRef.current = false; connect(id); } else resetRender(); };

  /* auto-chaos for an unattended demo */
  useEffect(() => {
    if (!t.autoChaos || stage !== 'running' || done || approval) return;
    const h = setTimeout(chaos, 8000);
    return () => clearTimeout(h);
  }, [t.autoChaos, stage, done, approval]); // eslint-disable-line

  /* real fleet roster from the backend */
  useEffect(() => {
    let stop = false;
    const tick = () => L.Api.listMissions().then(ms => { if (!stop) setFleetMissions(ms || []); });
    tick();
    const h = setInterval(tick, 6000);
    return () => { stop = true; clearInterval(h); };
  }, []);

  /* derived */
  const band = bandColor(dispRisk);
  const confidence = Math.max(2, Math.min(99, Math.round(100 - dispRisk)));
  const ticking = stage === 'running' && !done && connected;
  const coherence = status === 'replanning' ? 'reconciling' : 'coherent';
  const mission = { ...preset, nodes: graph.nodes, edges: graph.edges, chaosEdges: [], approvalNode: null };

  const statusOf = (mid) => {
    if (mid !== view) return ids.current[mid] ? { label: 'running', color: '#46d39a' } : { label: 'idle', color: '#3a4745' };
    if (approval) return { label: 'awaiting', color: '#f4c25a' };
    if (done) return phoneStatus === 'rejected' ? { label: 'held', color: '#ff6a72' } : { label: 'done', color: '#46d39a' };
    if (stage === 'idle') return { label: 'ready', color: '#5d6e6c' };
    return { label: 'running', color: '#46d39a' };
  };

  return (
    <div className="app">
      <header className="hdr">
        <div className="wordmark">
          <svg className="mark" viewBox="0 0 28 28" fill="none">
            <path d="M3 19 C3 19 7 7 11 7 C15 7 13 21 17 21 C21 21 25 9 25 9" stroke="#3fe0c5" strokeWidth="2" strokeLinecap="round" />
            <circle cx="3" cy="19" r="2.4" fill="#9d8bff" />
            <circle cx="25" cy="9" r="2.4" fill="#3fe0c5" />
            <circle cx="14" cy="14" r="1.5" fill="#dcebe8" opacity="0.6" />
          </svg>
          <span className="name">N<b>E</b>RVE</span>
          <span className="live-tag" title="Driven by the real backend">LIVE</span>
        </div>

        <div className="switcher">
          {Object.values(window.NERVE.MISSIONS).map(m => (
            <button key={m.id} data-on={view === m.id} onClick={() => setView(m.id)}>
              <span className="dot" />{m.label}
            </button>
          ))}
        </div>

        <Fleet missions={Object.values(window.NERVE.MISSIONS)} currentId={view}
          statusOf={statusOf} awaiting={!!approval} onSelect={(mid) => setView(mid)}
          recent={fleetMissions} />

        <div className="hdr-spacer" />

        <div className="hdr-status">
          <div className="statchip"><span className="k">Phase</span><span className="v">{phase}</span></div>
          <div className="statchip"><span className="k">Risk</span><span className="v tnum" style={{ color: band }}>{Math.round(dispRisk)}</span></div>
        </div>

        <div className="ctrls">
          <a className="btn demo-link" href="/showcase" target="_blank" rel="noopener"
            title="Open the scripted demo — always plays, no backend needed (great for presenting)">
            ▶ Demo
          </a>
          <button className="icon-btn" data-on={t.sound} title={t.sound ? 'Mute' : 'Sound on'} onClick={() => setTweak('sound', !t.sound)}>
            <CtrlIcon name={t.sound ? 'sound' : 'muted'} />
          </button>
          <button className="btn chaos" onClick={chaos} disabled={stage !== 'running' || done || !!approval}>
            <CtrlIcon name="chaos" />Inject chaos
          </button>
          <button className="btn" onClick={restart} disabled={stage === 'idle'}>
            <CtrlIcon name="restart" />Reconnect
          </button>
        </div>
      </header>

      <div className="body">
        <div className="col left">
          <Vitals
            risk={dispRisk} confidence={confidence} running={ticking}
            activeAgent={activeAgent} fireKey={fireKey} agents={window.NERVE.AGENTS}
            replans={replans} actions={actions}
            series={metricSeries} metric={metricMeta || preset.metric} baseline={(metricMeta || preset.metric).baseline}
            coherence={coherence}
          />
          <MemoryPanel facts={memory} />
        </div>

        <div className="col center">
          <div className="graph-head">
            <div className="goal-block">
              <div className="eyebrow">Mission · {preset.label}</div>
              {goalText
                ? <div className="goal">{goalText}</div>
                : <div className="goal" dangerouslySetInnerHTML={{ __html: preset.goal }} />}
            </div>
            <div className="phase-badge">
              <span className="pd" style={{ background: band, boxShadow: `0 0 8px ${band}` }} />{phase}
            </div>
          </div>

          <div className="graph-region">
            {stage === 'idle' && <GoalLauncher mission={preset} onLaunch={launch} />}

            {stage === 'launching' && <div className="launch-wait">Decomposing goal into a task graph…</div>}

            {done && (phoneStatus === 'rejected'
              ? <div className="done-toast" style={{ background: 'rgba(255,106,114,0.10)', borderColor: 'rgba(255,106,114,0.32)', color: '#ff6a72' }}>✕ Held — awaiting your review</div>
              : <div className="done-toast">✓ Mission {status === 'failed' ? 'ended' : 'complete'}</div>
            )}

            <MissionGraph mission={mission} nodeStates={nodeStates} fireKey={fireKey}
              activeNode={activeNode} tension={stage === 'running' && dispRisk > 58} />

            {stage !== 'idle' && (
              <div className="phone-fab">
                {phoneOpen
                  ? <TelegramPhone open={phoneOpen} approval={approval} status={phoneStatus}
                      onApprove={onApprove} onReject={onReject} onClose={() => setPhoneOpen(false)} />
                  : <button className="phone-pill" data-alert={phoneStatus === 'pending'} onClick={() => setPhoneOpen(true)}>
                      <span className="pp-dot" />Telegram{phoneStatus === 'pending' ? ' · 1 to approve' : ''}
                    </button>}
              </div>
            )}
          </div>
        </div>

        <div className="col right">
          <EventFeed events={events} />
          {approval && <ApprovalDock approval={approval} onApprove={onApprove} onReject={onReject} />}
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="Chaos engine" />
        <TweakToggle label="Auto-inject chaos" value={t.autoChaos} onChange={v => setTweak('autoChaos', v)} />
        <TweakSection label="Signals" />
        <TweakToggle label="Ambient sound" value={t.sound} onChange={v => setTweak('sound', v)} />
        <TweakToggle label="Show Telegram by default" value={t.phoneDefault} onChange={v => setTweak('phoneDefault', v)} />
      </TweaksPanel>

      <ResultModal
        open={resultOpen && !!approval && approval.kind === 'result'}
        goal={goalText}
        recommendation={approval && approval.recommendation}
        onApprove={() => { setResultOpen(false); onApprove(); }}
        onReject={() => { setResultOpen(false); onReject(); }}
        onClose={() => setResultOpen(false)}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
