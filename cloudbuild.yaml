# Cloud Build pipeline for NERVE: build → push to Artifact Registry → deploy to
# Cloud Run with Secret Manager bindings. Triggered on push to main (or run
# manually with `gcloud builds submit`).
#
# Image path: ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
# Requires an Artifact Registry repo named ${_REPOSITORY} to exist (see README).

substitutions:
  _REGION: us-central1
  _REPOSITORY: nerve
  _IMAGE: nerve
  _SERVICE: nerve

steps:
  # Step 1 — Build the container image.
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - .

  # Step 2 — Push the image to Artifact Registry.
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID

  # Step 3 — Deploy to Cloud Run with secrets injected from Secret Manager.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=MONGODB_URI=nerve-mongodb-uri:latest,DYNATRACE_API_TOKEN=nerve-dynatrace-api-token:latest,GITLAB_TOKEN=nerve-gitlab-token:latest,TELEGRAM_BOT_TOKEN=nerve-telegram-bot-token:latest
      # The app's config.py also requires non-secret env vars to boot. Provide them
      # here (uncomment + fill) or via `gcloud run services update`:
      # - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1,DYNATRACE_ENVIRONMENT_URL=https://xxxx.live.dynatrace.com,GITLAB_URL=https://gitlab.com,GITLAB_PROJECT_ID=123,GEMINI_MODEL=gemini-2.5-flash
      # The background orchestration loop needs CPU when no request is in flight:
      # - --no-cpu-throttling
      # - --min-instances=1

# Record the built image for provenance / later promotion.
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID

options:
  logging: CLOUD_LOGGING_ONLY
